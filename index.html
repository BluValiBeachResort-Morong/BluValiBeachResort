</head>
<body>

<!-- TOP BAR -->

    <span>📞 +63 915 713 5595</span>
    <span>✉️ bluvalibeachandresort@gmail.com</span>
  </div>
</div>

<!-- NAVBAR -->
<header>
  <div class="container nav">
    <h2 class="logo">BluVali Beach Resort</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#gallery">Explore</a>

  BOOK YOUR STAY

</header>

<!-- HERO VIDEO -->
<section class="hero">
  <video autoplay muted loop playsinline class="hero-video">
    <source src="bluvalivideo.mp4" type="video/mp4">
  </video>

  <div class="overlay">

</section>

<!-- GALLERY -->
<section class="gallery-section" id="gallery">
  <h2>Explore BluVali</h2>

  <div class="filters">
    <button onclick="filterSelection('all')" class="active">All</button>
    <button onclick="filterSelection('amenities')">Amenities</button>
    <button onclick="filterSelection('lounge')">Lounge</button>
    <button onclick="filterSelection('rooms')">Rooms</button>
  </div>

  <div class="gallery">

    <!-- AMENITIES -->
    <img src="images/amenities/Amenities1.jpeg" class="gallery-item amenities">
    <img src="images/amenities/Amenities2.jpeg" class="gallery-item amenities">
    <img src="images/amenities/Amenities3.jpeg" class="gallery-item amenities">
    <img src="images/amenities/Amenities4.jpeg" class="gallery-item amenities">
    <img src="images/amenities/Amenities5.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities6.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities7.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities8.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities9.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities10.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities11.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities12.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities13.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities14.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities15.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities16.jpg" class="gallery-item amenities">
    <img src="images/amenities/Amenities17.jpg" class="gallery-item amenities">

    <!-- LOUNGE -->
    <img src="images/lounge/BluvaliLounge.jpg" class="gallery-item lounge">
    <img src="images/lounge/BluvaliLounge1.jeg" class="gallery-item lounge">
    <img src="images/lounge/BluvaliLounge2.jpg" class="gallery-item lounge">
    <img src="images/lounge/BluvaliLounge3.jpeg" class="gallery-item lounge">
    <img src="images/lounge/BluvaliLounge4.jpeg" class="gallery-item lounge">

    <!-- ROOMS -->
    <img src="images/rooms/Room.jpg" class="gallery-item rooms">
    <img src="images/rooms/Room1.jpg" class="gallery-item rooms">
    <img src="images/rooms/Room2.jpg" class="gallery-item rooms">
    <img src="images/rooms/Room3.jpg" class="gallery-item rooms">
    <img src="images/rooms/Room4.jpg" class="gallery-item rooms">
    <img src="images/rooms/Room5.jpg" class="gallery-item rooms">
    <img src="images/rooms/Room6.jpg" class="gallery-item rooms">
    <img src="images/rooms/Room7.jpeg" class="gallery-item rooms">
    <img src="images/rooms/Room8.jpeg" class="gallery-item rooms">

  </div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img">
</div>

<script>
// FILTER
function filterSelection(category) {
  let items = document.getElementsByClassName("gallery-item");

  for (let i = 0; i < items.length; i++) {
    items[i].style.display =
      (category === "all" || items[i].classList.contains(category))
      ? "block"
      : "none";
  }

  let btns = document.querySelectorAll(".filters button");
  btns.forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
}

// LIGHTBOX
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

images.forEach(img => {
  img.addEventListener('click', () => {
    lightbox.style.display = "block";
    lightboxImg.src = img.src;
  });
});

function closeLightbox() {
  lightbox.style.display = "none";
}
</script>

</body>
</html>
